services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./input:/app/input
      - ./output:/app/output
      - ./processed:/app/processed
      - ./credentials:/app/credentials
      - ./users.json:/app/users.json
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://172.16.0.83:8000
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes: {}
